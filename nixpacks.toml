# ================= SETUP =================
[phases.setup]
nixPkgs = [
  "ffmpeg",
  "gcc",
  "libsodium"
]

# ================= INSTALL =================
[phases.install]
cmds = [
  "apt-get update",
  "apt-get install -y python3 python3-pip ffmpeg",
  "pip3 install --upgrade pip",
  "pip3 install -r requirements.txt"
]

# ================= START =================
[start]
cmd = "python3 bot.py"
