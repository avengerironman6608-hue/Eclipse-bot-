[phases.setup]
nixPkgs = ["ffmpeg", "gcc", "libsodium"]

[phases.install]
cmds = [
  "apt-get update",
  "apt-get install -y python3 python3-pip ffmpeg",
  "pip3 install --break-system-packages --upgrade pip",
  "pip3 install --break-system-packages -r requirements.txt"
]

[start]
cmd = "python3 bot.py"
